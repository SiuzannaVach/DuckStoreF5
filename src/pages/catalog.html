<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuckStore | Catalog</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/png" href="../assets/icons/duck-icon.png" />
  </head>
  <body>
    <header class="header">
      <section class="header__logo-container">
        <a href="../../index.html" class="header__logo-link">
          <img
            class="header__logo-img"
            src="../assets/icons/duck-icon.png"
            alt="DuckStore"
          />
          <div class="header__logo-text">DuckStore</div>
        </a>
      </section>

      <nav class="header__nav">
        <input type="checkbox" id="menu" class="header__menu-checkbox" hidden />
        <label for="menu" class="header__hamburguer">
          <span class="header__hamburger-icon"></span>
        </label>
        <ul class="header__menu">
          <li class="header__item">
            <a href="../../index.html" class="header__link">Home</a>
          </li>
          <li class="header__item">
            <a
              href="./catalog.html"
              class="header__link active"
              aria-current="page"
              >Catalog</a
            >
          </li>
          <li class="header__item">
            <a href="./contact.html" class="header__link">Contact</a>
          </li>
          <li class="header__item">
            <a href="./cart.html" class="header__link"
              ><img
                src="../assets/icons/cart.svg"
                alt="Shopping cart"
            /></a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="catalog-intro">
        <h1 class="catalog-intro__title">
          The Designer
          <span class="catalog-intro__title-accent">Duck</span> Collection
        </h1>
        <p class="catalog-intro__description">
          Premium rubber ducks reimagined as tactile art pieces for the modern
          enthusiast.
        </p>
      </section>

      <!-- 1. FILTROS (Arriba) -->
      <div class="filters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Classic">Classic</button>
        <button class="filter-btn" data-category="Limited edition">
          Limited edition
        </button>
        <button class="filter-btn" data-category="Exclusive">Exclusive</button>
      </div>

      <!-- 2. CONTENEDOR ÚNICO (Vacío para JS) -->
      <section class="catalog">
        <div id="products-container" class="catalog__grid">
          <!-- El JS llenará esto automáticamente -->
        </div>
      </section>
    </main>

    <footer id="footer">
      <div class="footer-content">
        <div class="footer-logo">
          <img
            src="../assets/icons/duck-icon.png"
            alt="DuckStore logo icon"
            class="footer__logo-img"
          />
          <p class="footer__logo-text">DuckStore</p>
        </div>

        <p class="footer__copyright">
          &copy;2026 DuckStore. Playing by Design.
        </p>
      </div>
    </footer>

    <!-- 3. SCRIPT AL FINAL -->
    <script type="module" src="../js/pages/catalog.js"></script>
  </body>
</html>
