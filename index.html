<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>DuckStore</title>
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>
    <header class="header">
      <section>
        <img src="./src/assets/icons/duck-icon.png" alt="DuckStore" />

        <div class="logo">DuckStore</div>
      </section>

      <nav>
        <input type="checkbox" id="menu" />
        <label for="menu">Menu</label>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Catalog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <footer class="footer">
      <div class="footer__container">
        <div class="footer__logo">
          <img
            src="./src/assets/icons/duck-icon.png"
            alt="DuckStore logo icon"
            class="footer__logo-img"
          />
          <p class="footer__logo-text">DuckStore</p>
        </div>

        <p class="footer__copyright">&copy;2026 DuckStore. Playing by Design.</p>
      </div>
    </footer>
  </body>
</html>
